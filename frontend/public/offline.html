<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – BUSINA</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #1a237e;
        text-align: center;
        padding: 20px;
      }
      .offline-icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
      }
      p {
        color: #666;
        max-width: 300px;
        line-height: 1.5;
      }
      .retry-btn {
        margin-top: 20px;
        padding: 12px 24px;
        background: #ff6b00;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost connection. Don't worry — we'll refresh as soon
      as you're back online.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </body>
</html>
